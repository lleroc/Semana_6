
<div class="table-responsive custom-table-container shadow-sm">
  <button routerLink="/clientes/nuevo" class="btn btn-outline-primary">Nuevo Clientes</button>

  <button (click)="imprimirPDF()" class="btn btn-outline-secondary"> Imprimir Lista PDF</button>

  <table class="table table-hover custom-table mb-0 display" id="tabla_Clientes">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Cedula</th>
        <th scope="col">Nombres</th>
        <th scope="col">Direccion</th>
        <th scope="col">Telefono</th>
        <th scope="col">Correo</th>
        <th scope="col"></th>
      </tr>
    </thead>
    <tbody>
   @for ( cliente of listaClientes; track cliente.id; let i=$index)  {
            <tr>
          
              
                <td><span class="badge badge-custom bg-success-soft text-success"></span></td>
                <th scope="row" class="fw-bold text-muted">{{ cliente.cedula }}</th>
                <td>
                <div class="d-flex align-items-center">
                    <span>{{cliente.nombres}}</span>
                </div>
                </td>
                <td>{{cliente.direccion}}</td>
                <td>{{cliente.telefono}}</td>
                <td class="fw-semibold text-dark">{{cliente.cedula}}</td>
                <td>
                    <!--<button routerLink="[editarcliente/'cliente.id']" >Editar</button>-->
                    <button [routerLink]="['/clientes/editar/',cliente.id]" >Editar</button>
                    <button [routerLink]="['/clientes/eliminar',cliente.id]">Eliminar</button>
                </td>
                
            </tr>
        }
           
      

    
    </tbody>
  </table>
</div>
