<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">Eliminar Cliente</h4>
    </div>

    <div class="card-body">
      <form [formGroup]="frmCliente" novalidate (submit)="eliminar()">
        <div class="mb-3">
          <label for="cedula" class="form-label">Cédula</label>
          <input  type="text" class="form-control" readonly formControlName="cedula" />
        </div>

        <div class="mb-3">
          <label for="nombres" class="form-label">Nombres</label>
          <input type="text" class="form-control" readonly formControlName="nombres"/>
        </div>

        <div class="mb-3">
          <label for="direccion" class="form-label">Dirección</label>
          <input type="text" class="form-control" readonly formControlName="direccion" />
        </div>

        <div class="mb-3">
          <label for="telefono" class="form-label">Teléfono</label>
          <input type="text" class="form-control" readonly formControlName="telefono" />
        </div>

        <div class="mb-3">
          <label for="correo" class="form-label">Correo</label>
          <input
            type="email"
            class="form-control"
            readonly
            formControlName="correo"
          />
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger"  >
            Eliminar
          </button>

          <button
            type="button"
            class="btn btn-secondary"
            routerLink="/clientes"
          >
            Cancelar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
